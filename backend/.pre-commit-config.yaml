# Monorepo note: the single .git lives at the repo root, but all Python tooling
# lives under backend/. Hooks are scoped to backend/ files, and mypy runs as a
# local hook that cd's into backend/ so it uses backend/pyproject.toml.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/
  - repo: local
    hooks:
      - id: mypy
        name: mypy (app package)
        entry: bash -c 'cd backend && uv run mypy app/'
        language: system
        types: [python]
        pass_filenames: false
        files: ^backend/app/
